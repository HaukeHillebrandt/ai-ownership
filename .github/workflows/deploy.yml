name: Build and deploy site

on:
  push:
    branches: [main]
  schedule:
    - cron: "43 6 * * *"   # daily rebuild: picks up edits to the Google Doc
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Pillow (image optimization)
        run: pip install pillow
      - name: Build site
        run: python3 build.py
      - name: Commit refreshed doc cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache
          git diff --cached --quiet || { git commit -m "Refresh doc cache [skip ci]" && git push; }
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Retry deploy (Pages is occasionally flaky)
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
